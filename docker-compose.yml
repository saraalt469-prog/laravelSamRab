services:
  php:
    container_name: "laravelSamRab"
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    networks:
      - app_net_p
  pgsqlDevelop:
    container_name: "modelSamRab"
    image: postgres:18.3
    ports:
      - "5431:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: root
    networks:
      - app_net_p

networks:
  app_net_p: {}
